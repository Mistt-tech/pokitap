<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>pokitap</title>
  <script>
    // Redirect to index.html, preserving the path as a query parameter
    // so Flutter's router can handle it.
    var pathSegmentsToKeep = 1; // number of path segments for the repo name
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>
</body>
</html>
